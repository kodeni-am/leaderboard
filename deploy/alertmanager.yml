# Alertmanager routing. The default receiver has no notifier configured, so
# alerts fire and are visible in Alertmanager/Grafana but go nowhere until you
# add a destination. Point the receiver at your Slack / PagerDuty / email /
# webhook — examples below.
route:
  receiver: default
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: default
    # slack_configs:
    #   - api_url: https://hooks.slack.com/services/XXX/YYY/ZZZ
    #     channel: "#alerts"
    # webhook_configs:
    #   - url: https://your-service/alert-webhook
