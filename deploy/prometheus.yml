global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: leaderboardd
    # Scrapes the server's /metrics directly over the internal docker network
    # (not through Caddy, which blocks /metrics publicly).
    static_configs:
      - targets: ["leaderboardd:8080"]
