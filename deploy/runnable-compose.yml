# OpenLeaderboard stack for Runnable (or any docker-compose host).
#
# Runnable supplies the public domain + automatic HTTPS via its own Caddy and
# reverse-proxies to the web service. In Runnable's project settings:
#   - enable compose mode, composeFile: deploy/runnable-compose.yml
#   - composeService: leaderboardd   (the web service, port 8080)
#   - set PUBLIC_URL to the assigned URL, plus SMTP_* for account email
#
# The leaderboardd image serves BOTH the dashboard SPA and the API on one
# origin (WEB_DIR=/web baked into the image), so the session cookies work.
services:
  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis-data:/data
    restart: unless-stopped

  leaderboardd:
    # Runnable builds this from the repo (it runs `docker compose up --build`).
    # To deploy a prebuilt image instead (faster, no host build), replace the
    # `build:` block with the published GHCR image:
    #   image: ghcr.io/kodeni-am/leaderboard:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      REDIS_ADDR: redis:6379
      LISTEN_ADDR: ":8080"
      LB_LOG_BACKEND: redis
      WEB_DIR: /web
      PUBLIC_URL: ${PUBLIC_URL:?set PUBLIC_URL to the app's public URL}
      SECURE_COOKIES: "true"
      # Browser games call the API cross-origin: "*" allows any origin (API-key
      # auth only). Set a comma-separated allowlist to restrict it.
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LB_REAPER_RETAIN: "168h"
      SIGNING_SECRET: ${SIGNING_SECRET:-}
      # Account email (verification / reset). Point at your SMTP provider;
      # without it, signups can't be verified.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-no-reply@example.com}
    # Runnable injects $PORT (a free host port) and proxies the domain to it, so
    # publish the container's 8080 to $PORT. It then runs
    # `docker compose port leaderboardd 8080` to find the mapping. Do NOT
    # hardcode a fixed host port (e.g. "8080:8080").
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
