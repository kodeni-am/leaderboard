name: publish-sdk

# Publishes sdk/typescript to npm when you push a tag like "sdk-v0.1.0",
# or manually via the Actions tab. Requires an NPM_TOKEN repository secret
# (an npm "Automation" token, which bypasses 2FA in CI).
on:
  push:
    tags: ["sdk-v*"]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm install --no-audit --no-fund
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
