name: release-sdk

# Publishes sdk/typescript to npm when its version in package.json is one that
# isn't on npm yet. package.json is authoritative: bump the version in your PR,
# and merging to main publishes exactly that version. Changes without a version
# bump are a no-op (the version is already published → skipped). Requires an
# NPM_TOKEN repo secret (npm "Automation" token).
on:
  push:
    branches: [main]
    paths:
      - "sdk/typescript/**"
  workflow_dispatch: {}

concurrency:
  group: release-sdk
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm install --no-audit --no-fund

      - name: Check whether this version is already published
        id: guard
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          name=$(node -p "require('./package.json').name")
          if npm view "${name}@${version}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "${name}@${version} is already on npm — nothing to release."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Releasing ${name}@${version}."
          fi

      - name: Publish
        if: steps.guard.outputs.publish == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
